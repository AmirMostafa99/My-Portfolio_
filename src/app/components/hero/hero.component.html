<section class="hero">
  <!-- Animated space background (moon + stars) -->
  <div class="hero-bg">
    <div class="stars stars--layer1"></div>
    <div class="stars stars--layer2"></div>
    <div class="stars stars--layer3"></div>

    <div class="moon-orbit">
      <div class="moon"></div>
    </div>
  </div>

  <div class="container">
    <div class="hero-content">
      <p class="intro">Hello, I'm Amir</p>
      <h1 class="title">Full Stack .NET Developer</h1>
      <p class="description">
        Full Stack .NET Developer With a passion For Building Applications That Solve Real-World
        Problems.
      </p>
      <button class="cta-button" (click)="scrollToProjects()">View My Work</button>

      <div class="social-icons">
        <a
          href="https://www.linkedin.com/in/amir-mustafa-ibrahim/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Visit my LinkedIn profile"
        >
          <i class="fab fa-linkedin"></i>
        </a>
        <a
          href="https://github.com/AmirMostafa99"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Visit my GitHub profile"
        >
          <i class="fab fa-github"></i>
        </a>
        <a
          [href]="socialLinks.whatsapp"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Contact me on WhatsApp"
        >
          <i class="fab fa-whatsapp"></i>
        </a>
      </div>
    </div>

    <div class="hero-image">
      <div class="hero-figure">
        <!-- glowing circle behind photo -->
        <div class="photo-glow"></div>

        <!-- orbiting stars around the image -->
        <div class="orbit orbit--outer">
          <span class="orbit-star orbit-star--1"></span>
          <span class="orbit-star orbit-star--2"></span>
          <span class="orbit-star orbit-star--3"></span>
        </div>

        <div class="orbit orbit--inner">
          <span class="orbit-star orbit-star--4"></span>
          <span class="orbit-star orbit-star--5"></span>
        </div>

        <!-- <img
          src="assets/images/ami-hero.png"
          alt="Amir - Full Stack .NET Developer"
          class="hero-photo"
          width="500"
          height="600"
        /> -->
      </div>
    </div>
  </div>
</section>
